name: daily-closed-packages

on:
  schedule:
    # 07:00 UTC = 09:00 Israel winter (IST), 10:00 Israel summer (IDT)
    # 06:00 UTC = 08:00 Israel winter (IST), 09:00 Israel summer (IDT)
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: daily-closed-packages
  cancel-in-progress: false

jobs:
  run-monitoring:
    runs-on: ubuntu-latest

    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
      MAIL_CC: ${{ secrets.MAIL_CC }}
      SCHEDULE_TZ: ${{ vars.SCHEDULE_TZ || 'Asia/Jerusalem' }}
      SCHEDULE_DAYS: ${{ vars.SCHEDULE_DAYS || 'Sun,Mon,Tue,Wed,Thu,Fri' }}
      SCHEDULE_START: "09:00"
      SCHEDULE_END: "09:30"
      RUN_OUTSIDE_SCHEDULE: ${{ github.event_name == 'workflow_dispatch' && 'true' || vars.RUN_OUTSIDE_SCHEDULE || 'false' }}
      HEADLESS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run CI script
        run: python scripts/run_ci.py

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results -o allure-report --clean

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore

      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-json
          path: artifacts/summary.json
          if-no-files-found: ignore

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy-report:
    needs: run-monitoring
    if: always()
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
